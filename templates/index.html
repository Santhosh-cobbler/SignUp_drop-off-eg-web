{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block head %}
<style>
    /* ... Your existing styles ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background-color: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background-color: white; border-radius: 16px; width: 100%; max-width: 400px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.05); }
    .logo { width: 40px; height: 40px; background-color: #1a1a2e; border-radius: 8px; margin-bottom: 24px; }
    .progress-dots { display: flex; gap: 6px; margin-bottom: 32px; }
    .dot { height: 6px; border-radius: 3px; }
    .dot.active { width: 24px; background-color: #1a1a2e; }
    .dot.inactive { width: 6px; background-color: #e5e5e0; }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #666; margin-bottom: 32px; }
    .input-group { margin-bottom: 24px; }
    .label { display: block; font-size: 13px; font-weight: 500; color: #666; margin-bottom: 8px; }
    .input { width: 100%; padding: 12px 16px; border: 1px solid #d1d1d1; border-radius: 8px; outline: none; }
    .input:focus { border-color: #1a1a2e; box-shadow: 0 0 0 3px rgba(26, 26, 46, 0.1); }
    .btn-primary { width: 100%; padding: 12px 16px; background-color: #1a1a2e; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="logo"></div>
    <div class="progress-dots">
        <div class="dot active"></div>
        <div class="dot inactive"></div>
        <div class="dot inactive"></div>
    </div>
    
    <h1 class="title">Create your account</h1>
    <p class="subtitle">Enter your email to get started.</p>

    <form  method="POST" onsubmit="window.FlowTrace.track('submit_email', document.getElementById('email').value)">
        <div class="input-group">
            <label class="label">Email address</label>
            <input type="email" id="email" name="email" class="input" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn-primary">Continue</button>
    </form>
</div>
{% endblock %}
