{% extends "base.html" %}
{% block title %}Verify Email{% endblock %}

{% block head %}
<style>
    /* ... Your existing OTP styles ... */
    body { font-family: system-ui, sans-serif; background-color: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background-color: white; border-radius: 12px; width: 100%; max-width: 380px; padding: 32px; text-align: center; }
    .otp-container { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 24px; }
    .otp-input { width: 45px; height: 56px; font-size: 22px; text-align: center; border: 1.5px solid #d0d0d0; border-radius: 8px; }
    .btn-primary { width: 100%; padding: 14px 16px; background-color: #1a1a2e; color: white; border: none; border-radius: 8px; font-weight: 600; }
    .btn-primary:not(:disabled) { background-color: #0066ff; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <h1 class="title" style="font-size: 24px; margin-bottom: 10px;">Verify your email</h1>
    <p class="subtitle" style="color: #666; margin-bottom: 20px;">We sent a code to your email.</p>
    
    <form onsubmit="window.FlowTrace.track('otp_verified'); alert('Success!'); return false;">
        <div class="otp-container">
            <input type="text" class="otp-input" maxlength="1" required>
            <input type="text" class="otp-input" maxlength="1" required>
            <input type="text" class="otp-input" maxlength="1" required>
            <input type="text" class="otp-input" maxlength="1" required>
            <input type="text" class="otp-input" maxlength="1" required>
            <input type="text" class="otp-input" maxlength="1" required>
        </div>
        <button type="submit" class="btn-primary" id="verify-btn" disabled>Verify code</button>
    </form>
</div>

<script>
    const inputs = document.querySelectorAll('.otp-input');
    const btn = document.getElementById('verify-btn');

    inputs.forEach((input, i) => {
        input.addEventListener('input', () => {
            if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
            btn.disabled = Array.from(inputs).some(inp => !inp.value);
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
        });
    });
</script>
{% endblock %}
